<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpellTick</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf6ef;
    --card-bg: #fffef9;
    --card-border: #e0d5c0;
    --text: #6b5c4a;
    --text-dim: #a89880;
    --flash: #e8a830;
    --tp: #9b7ec4;
    --ignite: #e07060;
    --smite: #5ea8d4;
    --heal: #6ab870;
    --ghost: #78c4e0;
    --default-spell: #9b8c78;
    --active-ring: #5cb860;
    --haste-tag: #58b8a0;
    --btn-reset: #ede4d3;
    --primary: #7bc67e;
    --primary-hover: #68b36b;
    --primary-border: #5aac5e;
    --shadow-sm: 0 2px 8px rgba(120,100,70,0.08);
    --shadow-md: 0 4px 16px rgba(120,100,70,0.12);
    /* 4pt spacing scale */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 12px;
    --space-lg: 16px;
    --space-xl: 24px;
    --space-2xl: 32px;
    --space-3xl: 48px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', 'PingFang SC', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: var(--space-2xl);
    gap: var(--space-xl);
    user-select: none;
    -webkit-user-select: none;
  }

  header h1 {
    font-size: 28px;
    font-weight: 800;
    color: #7bc67e;
    letter-spacing: -0.5px;
  }
  header .status {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    margin-top: 2px;
  }
  header .status.live { color: #5cb860; }
  header .status.offline { color: #d08070; }

  .toolbar {
    display: flex;
    gap: var(--space-md);
    flex-wrap: wrap;
  }
  .toolbar button {
    padding: 10px 24px;
    border: 2px solid var(--card-border);
    border-radius: 24px;
    background: var(--btn-reset);
    color: var(--text);
    cursor: pointer;
    font-family: 'Nunito', 'PingFang SC', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
    transition: transform .12s, box-shadow .15s, background .15s;
    box-shadow: var(--shadow-sm);
  }
  .toolbar button:hover {
    background: #f0e8d5;
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .toolbar button:active { transform: translateY(0) scale(0.97); }

  .toolbar button.primary {
    background: var(--primary);
    border-color: var(--primary-border);
    color: #fff;
  }
  .toolbar button.primary:hover { background: var(--primary-hover); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: var(--space-lg);
    width: 100%;
    max-width: 1200px;
  }

  .card {
    background: var(--card-bg);
    border: 2px solid var(--card-border);
    border-radius: 20px;
    padding: var(--space-lg) var(--space-lg) var(--space-xl);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-sm);
    box-shadow: var(--shadow-sm);
    transition: transform .15s, box-shadow .2s;
  }
  .card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }

  .card .champ {
    font-size: 16px;
    font-weight: 700;
    color: #6b5c4a;
    text-align: center;
  }
  .card .haste-tag {
    font-size: 11px;
    font-weight: 700;
    color: var(--haste-tag);
    background: #e0f5ee;
    padding: 3px 12px;
    border-radius: 20px;
    display: none;
  }
  .card .haste-tag.show { display: inline-block; }

  .spell-row {
    display: flex;
    gap: var(--space-md);
    width: 100%;
    justify-content: center;
  }

  .spell-btn {
    position: relative;
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 3px solid var(--card-border);
    background: #faf7f0;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: transform .12s, border-color .15s, box-shadow .15s;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .spell-btn:hover {
    box-shadow: var(--shadow-md);
    transform: scale(1.06);
  }
  .spell-btn:active { transform: scale(0.93); }

  .spell-btn .label {
    font-size: 11px;
    font-weight: 700;
    color: var(--default-spell);
    letter-spacing: 0.3px;
    text-align: center;
    line-height: 1.15;
    z-index: 1;
  }
  .spell-btn .cd-num {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    z-index: 1;
  }

  /* spell type colors */
  .spell-btn[data-spell="Flash"]     .label { color: var(--flash); }
  .spell-btn[data-spell="Teleport"]  .label { color: var(--tp); }
  .spell-btn[data-spell="Ignite"]    .label { color: var(--ignite); }
  .spell-btn[data-spell="Smite"]     .label { color: var(--smite); }
  .spell-btn[data-spell="Heal"]      .label { color: var(--heal); }
  .spell-btn[data-spell="Ghost"]     .label { color: var(--ghost); }
  .spell-btn[data-spell="Exhaust"]   .label { color: #c89848; }
  .spell-btn[data-spell="Barrier"]   .label { color: #d4a858; }
  .spell-btn[data-spell="Cleanse"]   .label { color: #68c4b8; }

  /* cooldown active */
  .spell-btn.on-cd {
    border-color: #e0d5c0;
    background: #f5f0e5;
    cursor: default;
    box-shadow: none;
  }
  .spell-btn.on-cd:hover { transform: none; box-shadow: none; }
  .spell-btn.on-cd .label { color: #c8b898 !important; }
  .spell-btn.on-cd .cd-num { color: #c8b898; }
  .spell-btn.on-cd:active { transform: none; }

  /* ring */
  .spell-btn svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .spell-btn svg circle.bg {
    fill: none;
    stroke: transparent;
    stroke-width: 4;
  }
  .spell-btn svg circle.fg {
    fill: none;
    stroke: var(--active-ring);
    stroke-width: 4;
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: center;
    transition: stroke-dashoffset 1s linear, stroke .3s;
  }

  .spell-btn .timer-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 22px;
    font-weight: 800;
    color: #6b5c4a;
    z-index: 2;
    pointer-events: none;
    display: none;
  }
  .spell-btn.on-cd .timer-text { display: block; }
  .spell-btn.on-cd .label { visibility: hidden; }
  .spell-btn.on-cd .cd-num { visibility: hidden; }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: var(--space-3xl) var(--space-lg);
    color: var(--text-dim);
  }
  .empty-state .icon { font-size: 56px; margin-bottom: var(--space-md); }

  /* toast notifications */
  .toast-container {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: var(--space-sm);
    padding: var(--space-lg);
    pointer-events: none;
    width: 100%;
    max-width: 420px;
  }

  .toast {
    background: var(--card-bg);
    border: 2px solid var(--card-border);
    border-radius: 16px;
    padding: 12px 16px;
    box-shadow: 0 6px 24px rgba(120,100,70,0.18);
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Nunito', 'PingFang SC', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 600;
    pointer-events: auto;
    cursor: pointer;
    transform: translateY(-120%);
    opacity: 0;
    transition: transform .35s cubic-bezier(0.16, 1, 0.3, 1), opacity .25s ease-out;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .toast.dismissing {
    transform: translateY(-120%);
    opacity: 0;
  }

  .toast-icon {
    font-size: 18px;
    flex-shrink: 0;
  }

  .toast-champ {
    font-weight: 800;
    color: #6b5c4a;
  }

  .toast-spell {
    font-weight: 700;
  }
  .toast[data-spell="Flash"]     .toast-spell { color: var(--flash); }
  .toast[data-spell="Teleport"]  .toast-spell { color: var(--tp); }
  .toast[data-spell="Ignite"]    .toast-spell { color: var(--ignite); }
  .toast[data-spell="Smite"]     .toast-spell { color: var(--smite); }
  .toast[data-spell="Heal"]      .toast-spell { color: var(--heal); }
  .toast[data-spell="Ghost"]     .toast-spell { color: var(--ghost); }
  .toast[data-spell="Exhaust"]   .toast-spell { color: #c89848; }
  .toast[data-spell="Barrier"]   .toast-spell { color: #d4a858; }
  .toast[data-spell="Cleanse"]   .toast-spell { color: #68c4b8; }

  .toast-label {
    color: #5cb860;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<header>
  <h1>SpellTick</h1>
  <div class="status offline" id="status">Not connected — start a game or mock server</div>
</header>

<div class="toolbar">
  <button class="primary" onclick="fetchData()">Refresh</button>
  <button onclick="resetAll()">Reset All Timers</button>
</div>

<div class="grid" id="grid">
  <div class="empty-state">
    <div class="icon">&#9881;</div>
    <div>Click <strong>Refresh</strong> to load enemy summoner spells</div>
  </div>
</div>

<script>
// --- Timer engine ---
const timers = new Map();

function timerKey(champion, spellName) {
    return champion + "::" + spellName;
}

function startTimer(champion, spellName, cdSeconds) {
    const key = timerKey(champion, spellName);
    stopTimer(key);

    const startMs = Date.now();
    const intervalId = setInterval(() => tick(key), 100);

    timers.set(key, { cd: cdSeconds, startMs, intervalId });
    updateButtonUI(key, cdSeconds);
}

function stopTimer(key) {
    const t = timers.get(key);
    if (t) {
        clearInterval(t.intervalId);
        timers.delete(key);
    }
}

function tick(key) {
    const t = timers.get(key);
    if (!t) return;

    const elapsed = (Date.now() - t.startMs) / 1000;
    const remaining = t.cd - elapsed;

    if (remaining <= 0) {
        stopTimer(key);
        resetButtonUI(key);
        showToast(key);
        return;
    }

    updateButtonUI(key, remaining);
}

function showToast(key) {
    const [champion, spellName] = key.split('::');
    const container = document.getElementById('toastContainer');

    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.dataset.spell = spellName;
    toast.innerHTML = '<span class="toast-icon">🍃</span>'
        + '<span class="toast-champ">' + escapeHTML(champion) + '</span>'
        + '<span class="toast-spell">' + escapeHTML(spellName) + '</span>'
        + '<span class="toast-label">ready!</span>';
    toast.addEventListener('click', () => dismissToast(toast));

    container.appendChild(toast);
    requestAnimationFrame(() => {
        requestAnimationFrame(() => toast.classList.add('show'));
    });

    const autoDismiss = setTimeout(() => dismissToast(toast), 2500);
    toast._dismissTimer = autoDismiss;
}

function dismissToast(toast) {
    if (toast.classList.contains('dismissing')) return;
    clearTimeout(toast._dismissTimer);
    toast.classList.add('dismissing');
    toast.addEventListener('transitionend', () => { if (toast.parentNode) toast.remove(); });
    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 400);
}

function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function updateButtonUI(key, remaining) {
    const el = document.querySelector(`[data-timer-key="${CSS.escape(key)}"]`);
    if (!el) return;

    const cd = parseFloat(el.dataset.cd);
    const pct = cd > 0 ? Math.max(0, remaining / cd) : 0;
    const mins = Math.floor(remaining / 60);
    const secs = Math.floor(remaining % 60);
    const text = mins > 0
        ? `${mins}:${String(secs).padStart(2,'0')}`
        : String(secs);

    const timerText = el.querySelector('.timer-text');
    if (timerText) timerText.textContent = text;

    const circle = el.querySelector('circle.fg');
    if (circle) {
        const r = circle.getAttribute('r');
        const C = 2 * Math.PI * r;
        circle.setAttribute('stroke-dasharray', C);
        circle.setAttribute('stroke-dashoffset', C * (1 - pct));

        if (remaining <= 15) {
            circle.setAttribute('stroke', '#e07060');
        } else if (remaining <= 60) {
            circle.setAttribute('stroke', '#e8a830');
        } else {
            circle.setAttribute('stroke', '#5cb860');
        }
    }

    if (remaining <= 0) {
        el.classList.remove('on-cd');
        resetButtonUI(key);
    } else {
        el.classList.add('on-cd');
    }
}

function resetButtonUI(key) {
    const el = document.querySelector(`[data-timer-key="${CSS.escape(key)}"]`);
    if (!el) return;
    el.classList.remove('on-cd');
    const timerText = el.querySelector('.timer-text');
    if (timerText) timerText.textContent = '';
    const circle = el.querySelector('circle.fg');
    if (circle) circle.setAttribute('stroke-dashoffset', '0');
}

function resetAll() {
    for (const key of timers.keys()) {
        clearInterval(timers.get(key).intervalId);
        resetButtonUI(key);
    }
    timers.clear();
}

function onSpellClick(el) {
    if (el.classList.contains('on-cd')) return;

    const key = el.dataset.timerKey;
    const cd = parseInt(el.dataset.cd, 10);
    const [champion, spellName] = key.split('::');
    startTimer(champion, spellName, cd);
}

// --- Data fetching ---

async function fetchData() {
    const grid = document.getElementById('grid');
    const status = document.getElementById('status');

    grid.innerHTML = '<div class="empty-state"><div class="icon">&#8987;</div><div>Loading...</div></div>';

    try {
        const resp = await fetch('/api/gamedata?_=' + Date.now());
        const data = await resp.json();

        if (data.error || data.players.length === 0) {
            status.textContent = 'Not connected — start a game or mock server';
            status.className = 'status offline';
            grid.innerHTML = `<div class="empty-state">
                <div class="icon">&#9881;</div>
                <div>No game data available.</div>
            </div>`;
            return;
        }

        status.textContent = 'Live — ' + data.players.length + ' enemies detected';
        status.className = 'status live';

        renderPlayers(data.players);
    } catch (e) {
        status.textContent = 'Connection error';
        status.className = 'status offline';
        grid.innerHTML = `<div class="empty-state">
            <div class="icon">&#9888;</div>
            <div>Could not reach the backend.</div>
        </div>`;
    }
}

function renderPlayers(players) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    for (const p of players) {
        const card = document.createElement('div');
        card.className = 'card';

        const champEl = document.createElement('div');
        champEl.className = 'champ';
        champEl.textContent = p.champion;
        card.appendChild(champEl);

        if (p.haste > 0) {
            const tag = document.createElement('div');
            tag.className = 'haste-tag show';
            tag.textContent = '+' + p.haste + ' haste';
            card.appendChild(tag);
        }

        const row = document.createElement('div');
        row.className = 'spell-row';

        const spells = [...p.spells].sort((a, b) => a.name === 'Flash' ? 1 : b.name === 'Flash' ? -1 : 0);

        for (const spell of spells) {
            const key = timerKey(p.champion, spell.name);
            const existing = timers.get(key);
            let remaining = 0;
            if (existing) {
                remaining = existing.cd - (Date.now() - existing.startMs) / 1000;
                if (remaining < 0) remaining = 0;
            }

            const btn = buildSpellButton(p.champion, spell, key, remaining);
            row.appendChild(btn);
        }

        card.appendChild(row);
        grid.appendChild(card);
    }

    for (const [key, t] of timers) {
        const remaining = t.cd - (Date.now() - t.startMs) / 1000;
        if (remaining <= 0) {
            stopTimer(key);
            resetButtonUI(key);
            showToast(key);
        } else {
            updateButtonUI(key, remaining);
        }
    }
}

function buildSpellButton(champion, spell, key, remaining) {
    const btn = document.createElement('button');
    btn.className = 'spell-btn';
    btn.dataset.spell = spell.name;
    btn.dataset.timerKey = key;
    btn.dataset.cd = spell.cd;
    btn.title = `${spell.name} — ${spell.cd}s CD`;
    btn.onclick = () => onSpellClick(btn);

    const r = 39;
    const C = 2 * Math.PI * r;

    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', '0 0 88 88');

    const bgCircle = document.createElementNS(svgNS, 'circle');
    bgCircle.setAttribute('class', 'bg');
    bgCircle.setAttribute('cx', '44');
    bgCircle.setAttribute('cy', '44');
    bgCircle.setAttribute('r', String(r));
    svg.appendChild(bgCircle);

    const fgCircle = document.createElementNS(svgNS, 'circle');
    fgCircle.setAttribute('class', 'fg');
    fgCircle.setAttribute('cx', '44');
    fgCircle.setAttribute('cy', '44');
    fgCircle.setAttribute('r', String(r));
    fgCircle.setAttribute('stroke-dasharray', String(C));
    fgCircle.setAttribute('stroke-dashoffset', '0');
    svg.appendChild(fgCircle);

    btn.appendChild(svg);

    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = spell.name;
    btn.appendChild(label);

    const cdNum = document.createElement('span');
    cdNum.className = 'cd-num';
    cdNum.textContent = spell.cd + 's';
    btn.appendChild(cdNum);

    const timerText = document.createElement('span');
    timerText.className = 'timer-text';
    btn.appendChild(timerText);

    if (remaining > 0) {
        btn.classList.add('on-cd');
        const mins = Math.floor(remaining / 60);
        const secs = Math.floor(remaining % 60);
        timerText.textContent = mins > 0
            ? `${mins}:${String(secs).padStart(2, '0')}`
            : String(Math.floor(remaining));
        const pct = remaining / spell.cd;
        fgCircle.setAttribute('stroke-dashoffset', String(C * (1 - pct)));
    }

    return btn;
}

fetchData();
</script>
</body>
</html>
